<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckDuckGo Proxy Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 DuckDuckGo Search Proxy</h1>
            <p>Search the web privately through this proxy</p>
        </div>

        <div class="search-section">
            <form id="searchForm">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search anything..." 
                        required
                    >
                    <button type="submit" class="search-btn">Search</button>
                </div>
            </form>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <p>Searching...</p>
        </div>

        <div id="results" class="results-container"></div>

        <!-- Proxy Modal -->
        <div id="proxyModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2 id="proxyTitle">Loading...</h2>
                <div id="proxyContent" class="proxy-body"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
